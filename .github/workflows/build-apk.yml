name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool libtool-bin pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-venv screen automake

      - name: Install Buildozer
        run: |
          pip install buildozer cython

      - name: Build APK
        run: |
          export ANDROIDAPI=34
          export ANDROIDMINAPI=24
          rm -rf .buildozer
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inventariopro-apk
          path: bin/*.apk
